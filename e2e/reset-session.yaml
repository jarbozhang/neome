# 新顾客重置验证
# 验证点击"新顾客"后状态重置并重新进入 listening

appId: com.neome.app
---
- launchApp

- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"

# 等待主屏幕和连接
- extendedWaitUntil:
    visible:
      id: "main-screen"
    timeout: 10000

- extendedWaitUntil:
    visible: "connected:true"
    timeout: 15000

# 等待进入 listening 状态（欢迎语流程完成）
- extendedWaitUntil:
    visible: "state:listening"
    timeout: 30000

- takeScreenshot: "01-before-reset"

# 点击"新顾客"按钮
- tapOn:
    id: "reset-button"

- takeScreenshot: "02-after-reset-tap"

# 重新连接后再次进入 listening
- extendedWaitUntil:
    visible: "state:listening"
    timeout: 30000

- takeScreenshot: "03-state-listening-again"
